<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Дитяча погода в небі</title>

  <!-- A-Frame core -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- або найновіша: https://aframe.io/releases/1.7.1/aframe.min.js (перевір на сумісність) -->

  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    #start-btn {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #00aaff; color: white; border: none; border-radius: 40px;
      padding: 14px 28px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
      z-index: 200; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    #start-btn:active { transform: translateX(-50%) scale(0.96); }
    
    .weather-panel {
      position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px;
      z-index: 100; background: rgba(0,0,0,0.7); padding: 12px 20px; border-radius: 60px;
      margin: 0 auto; width: fit-content; backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
    }
    
    .weather-btn {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%); border: none; border-radius: 50px;
      padding: 12px 24px; font-size: 1.2rem; font-weight: bold; color: #1a2a3a; cursor: pointer;
      transition: all 0.2s ease; font-family: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-width: 100px;
    }
    .weather-btn:active {
      transform: scale(0.96); background: linear-gradient(135deg, #e8e8e8 0%, #dddddd 100%);
    }
    
    @media (max-width: 700px) { .weather-panel { gap: 8px; padding: 10px 16px; } .weather-btn { padding: 8px 16px; font-size: 1rem; min-width: 70px; } }
    @media (max-width: 480px) { .weather-btn { padding: 6px 12px; font-size: 0.9rem; min-width: 60px; } }
    
    #status {
      position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: #00ffcc;
      padding: 8px 14px; border-radius: 20px; font-family: monospace; z-index: 200; font-size: 12px;
      pointer-events: none; backdrop-filter: blur(4px); font-weight: 500; letter-spacing: 0.5px;
      border-left: 3px solid #00ffcc;
    }
  </style>
</head>
<body>
  <div id="status">🔄 Завантаження...</div>
  <button id="start-btn">🚀 Запустити AR</button>

  <!-- AR scene -->
  <a-scene
    background="color: #000000"
    renderer="colorManagement: true; antialias: true; alpha: true;"
    xr-mode-ui="enabled: true; enterAREnabled: true; exitAREnabled: true;"
    webxr="mode: immersive-ar; requiredFeatures: local-floor; optionalFeatures: hit-test, dom-overlay, hand-tracking;"
  >
    <a-assets>
      <img id="skySunny"  src="./assets/sunny.png"  crossorigin="anonymous">
      <img id="skyCloudy" src="./assets/cloudy.png" crossorigin="anonymous">
      <img id="skyRainy"  src="./assets/rainy.png"  crossorigin="anonymous">
      <img id="skyStormy" src="./assets/stormy.png" crossorigin="anonymous">
      <img id="skyDefault" src="./assets/space.png" crossorigin="anonymous">
      <img id="cloudTexture" src="./assets/cloud.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <!-- Погода – велика прозора сфера (не закриває камеру) -->
    <a-entity id="weatherDome" scale="120 120 120" rotation="0 0 0">
      <a-sphere id="weatherSky"
               material="src: #skyDefault; transparent: true; opacity: 0.35; side: double; alphaTest: 0.01;"
               position="0 0 0">
      </a-sphere>
    </a-entity>

    <!-- Рухома хмаринка -->
    <a-image id="movingCloud"
             src="#cloudTexture"
             width="1.5" height="1.5"
             material="transparent: true; alphaTest: 0.3"
             look-at="[camera]"
             visible="false">
    </a-image>

    <!-- Світло -->
    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.7; position: 3 5 2"></a-entity>
  </a-scene>

  <div class="weather-panel">
    <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
    <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
    <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
    <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
  </div>

  <audio id="soundSunny"  src="./sounds/sunny.mp3"  preload="auto"></audio>
  <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
  <audio id="soundRainy"  src="./sounds/rainy.mp3"  preload="auto"></audio>
  <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>

  <script>
    const statusDiv = document.getElementById('status');
    function setStatus(msg, isError = false) {
      statusDiv.innerHTML = msg;
      console.log(`[Status] ${msg}`);
      statusDiv.style.borderLeftColor = isError ? '#ff5555' : '#00ffcc';
      statusDiv.style.color = isError ? '#ffaaaa' : '#00ffcc';
    }

    function stopAllSounds() {
      ['soundSunny', 'soundCloudy', 'soundRainy', 'soundStormy'].forEach(id => {
        const audio = document.getElementById(id);
        if (audio && !audio.paused) { audio.pause(); audio.currentTime = 0; }
      });
    }

    const weatherMap = {
      sunny:  { textureId: '#skySunny',  soundId: 'soundSunny',  name: 'Сонячно' },
      cloudy: { textureId: '#skyCloudy', soundId: 'soundCloudy', name: 'Хмарно' },
      rainy:  { textureId: '#skyRainy',  soundId: 'soundRainy',  name: 'Дощ' },
      stormy: { textureId: '#skyStormy', soundId: 'soundStormy', name: 'Гроза' }
    };

    function setWeather(weatherType) {
      const weather = weatherMap[weatherType];
      if (!weather) return;

      stopAllSounds();

      const sky = document.getElementById('weatherSky');
      if (sky) {
        sky.setAttribute('material', 'src', weather.textureId);
        setStatus(`🌤️ Погода: ${weather.name}`);
      }

      const audio = document.getElementById(weather.soundId);
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.warn('Audio play blocked:', e));
      }
    }

    document.querySelectorAll('.weather-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const weather = btn.getAttribute('data-weather');
        setWeather(weather);
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => btn.style.transform = '', 150);
      });
    });

    // Хмаринка
    const cloud = document.getElementById('movingCloud');
    let cloudAngle = 0;
    const cloudRadius = 3.2;
    const cloudSpeed = 0.8;
    let lastTime = 0;

    function animateCloud(time) {
      if (!cloud) return requestAnimationFrame(animateCloud);

      const dt = (time - lastTime) / 1000;
      lastTime = time;
      cloudAngle += cloudSpeed * dt;

      const cam = document.querySelector('a-camera').object3D;
      const pos = cam.getWorldPosition(new THREE.Vector3());

      const x = pos.x + cloudRadius * Math.cos(cloudAngle);
      const z = pos.z + cloudRadius * Math.sin(cloudAngle);
      const y = pos.y + 2.1;

      cloud.setAttribute('position', {x, y, z});
      requestAnimationFrame(animateCloud);
    }

    // Fallback для хмари (якщо не завантажилась)
    const tex = document.getElementById('cloudTexture');
    if (tex.complete && tex.naturalWidth > 0) {
      cloud.setAttribute('visible', 'true');
    } else if (tex) {
      tex.onload = () => { cloud.setAttribute('visible', 'true'); setStatus('☁️ Хмаринка OK'); };
      tex.onerror = () => {
        // тут можна вставити твій createFallbackCloudTexture()
        setStatus('☁️ Використовуємо fallback хмару');
        cloud.setAttribute('visible', 'true');
      };
    }

    // Запуск AR
    const startBtn = document.getElementById('start-btn');
    const scene = document.querySelector('a-scene');

    startBtn.addEventListener('click', async () => {
      if (!navigator.xr) {
        setStatus('❌ Браузер не підтримує WebXR', true);
        return;
      }

      const supported = await navigator.xr.isSessionSupported('immersive-ar');
      if (!supported) {
        setStatus('❌ Пристрій не підтримує immersive-ar', true);
        return;
      }

      setStatus('🎥 Запускаємо AR...');

      try {
        await scene.enterAR();
        startBtn.style.display = 'none';
        setStatus('✅ AR активний! Види реальний світ?');
        requestAnimationFrame(animateCloud);
      } catch (err) {
        console.error(err);
        setStatus(`❌ Помилка: ${err.message || 'невідома'}`, true);
      }
    });

    // Розблокування аудіо
    function unlockAudio() {
      document.querySelectorAll('audio').forEach(a => a.load());
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('click', unlockAudio);

    window.addEventListener('load', () => {
      setStatus('✅ Готово. Натисни "Запустити AR"');
    });
  </script>
</body>
</html>
