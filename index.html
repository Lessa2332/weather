<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>8th Wall: Дитяча погода в небі</title>
  
  <!-- Self-hosted 8th Wall core modules (без app key) -->
  <script src="./xr-standalone/xr.js"></script>
  <script src="./xr-standalone/xr-slam.js"></script>
  
  <!-- A-Frame та 8th Wall A-Frame компоненти -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://8thwall.org/aframe/8frame-1.5.0.min.js"></script>
  
  <!-- XRExtras (допоміжні інструменти) -->
  <script src="https://8thwall.org/xrextras/xrextras.js"></script>
  <script src="https://8thwall.org/xrextras/landing-page.js"></script>
  <script src="https://8thwall.org/xrextras/coaching-overlay.js"></script>
  
  <!-- Користувацький компонент для центрування -->
  <script src="./sky-recenter.js"></script>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .weather-panel {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 12px 20px;
      border-radius: 60px;
      margin: 0 auto;
      width: fit-content;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .weather-btn {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1a2a3a;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-width: 100px;
    }
    
    .weather-btn:active {
      transform: scale(0.96);
      background: linear-gradient(135deg, #e8e8e8 0%, #dddddd 100%);
    }
    
    @media (max-width: 700px) {
      .weather-panel { gap: 8px; padding: 10px 16px; }
      .weather-btn { padding: 8px 16px; font-size: 1rem; min-width: 70px; }
    }
    
    @media (max-width: 480px) {
      .weather-btn { padding: 6px 12px; font-size: 0.9rem; min-width: 60px; }
    }
    
    #status {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.8);
      color: #00ffcc;
      padding: 8px 14px;
      border-radius: 20px;
      font-family: monospace;
      z-index: 200;
      font-size: 12px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      font-weight: 500;
      letter-spacing: 0.5px;
      border-left: 3px solid #00ffcc;
    }
    
    /* Стилі для помилок XRExtras (якщо щось піде не так) */
    .xrextras-error {
      background: rgba(255,50,50,0.9);
      color: white;
    }
  </style>
</head>
<body>
  <div id="status">🔄 Ініціалізація AR...</div>
  
  <!-- Головна AR-сцена з виправленими атрибутами -->
  <a-scene
    xrweb="webxr"
    xrextras-loading
    xrextras-runtime-error
    landing-page
    sky-coaching-overlay
    sky-recenter
    renderer="colorManagement: true; alpha: true; antialias: true">
    
    <a-assets>
      <img id="skySunny" src="./assets/sunny.png" crossorigin="anonymous">
      <img id="skyCloudy" src="./assets/cloudy.png" crossorigin="anonymous">
      <img id="skyRainy" src="./assets/rainy.png" crossorigin="anonymous">
      <img id="skyStormy" src="./assets/stormy.png" crossorigin="anonymous">
      <img id="skyDefault" src="./assets/space.png" crossorigin="anonymous">
      <!-- Додаткове зображення для хмари (якщо відсутнє, створимо canvas-текстуру) -->
      <img id="cloudTexture" src="./assets/cloud.png" crossorigin="anonymous">
    </a-assets>
    
    <!-- Камера з правильним розташуванням -->
    <a-camera position="0 1.6 0" user-height="1.6">
      <a-cursor material="color: #00ffcc; shader: flat" opacity="0.6"></a-cursor>
    </a-camera>
    
    <!-- Шар неба з покращеним рендерингом -->
    <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.8">
      <a-sky id="weatherSky" 
             material="src: #skyDefault; transparent: true; opacity: 1; alphaTest: 0.3; side: back;">
      </a-sky>
      <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
      <!-- Додаткове джерело світла для кращого вигляду -->
      <a-entity light="type: directional; intensity: 0.8; position: 2 3 1;"></a-entity>
    </a-entity>
    
    <!-- Рухома хмара з перевіркою наявності текстури -->
    <a-image id="movingCloud"
             src="#cloudTexture"
             width="1.5" 
             height="1.5"
             material="transparent: true; alphaTest: 0.3"
             look-at="[camera]"
             visible="false">
    </a-image>
  </a-scene>
  
  <!-- Панель керування погодою -->
  <div class="weather-panel">
    <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
    <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
    <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
    <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
  </div>
  
  <!-- Аудіо-елементи з попереднім завантаженням -->
  <audio id="soundSunny" src="./sounds/sunny.mp3" preload="auto"></audio>
  <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
  <audio id="soundRainy" src="./sounds/rainy.mp3" preload="auto"></audio>
  <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>
  
  <script>
    // ==================== ПОКРАЩЕНИЙ КЕРУВАННЯ СТАТУСОМ ====================
    const statusDiv = document.getElementById('status');
    function setStatus(msg, isError = false) {
      statusDiv.innerHTML = msg;
      console.log(`[Status] ${msg}`);
      if (isError) {
        statusDiv.style.borderLeftColor = '#ff5555';
        statusDiv.style.color = '#ffaaaa';
      } else {
        statusDiv.style.borderLeftColor = '#00ffcc';
        statusDiv.style.color = '#00ffcc';
      }
    }
    
    // ==================== УПРАВЛІННЯ ЗВУКАМИ ====================
    function stopAllSounds() {
      const soundIds = ['soundSunny', 'soundCloudy', 'soundRainy', 'soundStormy'];
      soundIds.forEach(id => {
        const audio = document.getElementById(id);
        if (audio && !audio.paused) {
          audio.pause();
          audio.currentTime = 0;
        }
      });
    }
    
    // ==================== ЗМІНА ПОГОДИ ====================
    const skyEntity = document.getElementById('weatherSky');
    const weatherMap = {
      sunny: { textureId: '#skySunny', soundId: 'soundSunny', name: 'Сонячно' },
      cloudy: { textureId: '#skyCloudy', soundId: 'soundCloudy', name: 'Хмарно' },
      rainy: { textureId: '#skyRainy', soundId: 'soundRainy', name: 'Дощ' },
      stormy: { textureId: '#skyStormy', soundId: 'soundStormy', name: 'Гроза' }
    };
    
    // Функція зміни погоди з обробкою помилок
    function setWeather(weatherType) {
      const weather = weatherMap[weatherType];
      if (!weather) {
        console.warn(`Невідомий тип погоди: ${weatherType}`);
        return;
      }
      
      // Зупиняємо всі звуки
      stopAllSounds();
      
      // Змінюємо текстуру неба
      if (skyEntity && skyEntity.components && skyEntity.components.material) {
        skyEntity.setAttribute('material', 'src', weather.textureId);
        setStatus(`🌤️ Погода: ${weather.name}`);
      } else {
        console.error('Скай-обʼєкт не знайдено або не готовий');
        setStatus(`⚠️ Помилка зміни погоди`, true);
      }
      
      // Відтворюємо звук
      const audio = document.getElementById(weather.soundId);
      if (audio) {
        audio.currentTime = 0;
        // Відтворюємо з обробкою помилок автоплею
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(e => {
            console.warn(`Аудіо не відтворено (${weather.name}):`, e);
            setStatus(`🔊 Натисніть ще раз для звуку`, false);
          });
        }
      }
    }
    
    // Додаємо обробники подій для кнопок
    document.querySelectorAll('.weather-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const weather = btn.getAttribute('data-weather');
        setWeather(weather);
        // Анімація натискання (додатково)
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => { btn.style.transform = ''; }, 150);
      });
    });
    
    // ==================== АНІМАЦІЯ ХМАРИ (ОПТИМІЗОВАНА) ====================
    const cloudImage = document.getElementById('movingCloud');
    let cloudAngle = 0;
    const cloudRadius = 2.8;      // радіус обертання навколо камери
    const cloudSpeed = 0.9;       // радіан за секунду
    let lastFrameTime = 0;
    let animationActive = true;
    let cloudTextureLoaded = false;
    
    // Перевіряємо, чи завантажилась текстура хмари
    const cloudTextureElement = document.getElementById('cloudTexture');
    if (cloudTextureElement && cloudTextureElement.complete && cloudTextureElement.naturalWidth > 0) {
      cloudTextureLoaded = true;
      cloudImage.setAttribute('visible', 'true');
    } else if (cloudTextureElement) {
      cloudTextureElement.onload = () => {
        cloudTextureLoaded = true;
        cloudImage.setAttribute('visible', 'true');
        setStatus('☁️ Хмарка завантажена', false);
      };
      cloudTextureElement.onerror = () => {
        console.warn('Файл cloud.png відсутній, створюємо fallback-хмарку');
        createFallbackCloudTexture();
      };
    } else {
      createFallbackCloudTexture();
    }
    
    // Створюємо fallback-текстуру для хмари через canvas (якщо файл відсутній)
    function createFallbackCloudTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      // Малюємо пухнасту хмару
      ctx.beginPath();
      ctx.arc(128, 128, 60, 0, Math.PI * 2);
      ctx.arc(180, 110, 50, 0, Math.PI * 2);
      ctx.arc(80, 110, 45, 0, Math.PI * 2);
      ctx.arc(150, 170, 40, 0, Math.PI * 2);
      ctx.arc(100, 160, 35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(240,240,255,0.9)';
      ctx.beginPath();
      ctx.arc(140, 120, 35, 0, Math.PI * 2);
      ctx.fill();
      
      const textureId = 'cloudFallback';
      const img = new Image();
      img.src = canvas.toDataURL();
      img.id = textureId;
      document.querySelector('a-assets').appendChild(img);
      cloudImage.setAttribute('src', `#${textureId}`);
      cloudImage.setAttribute('visible', 'true');
      cloudTextureLoaded = true;
      setStatus('☁️ Хмарка (fallback) створена', false);
    }
    
    // Оптимізована анімація хмари з використанням requestAnimationFrame
    function animateCloud(currentTime) {
      if (!animationActive) return;
      
      if (!cloudTextureLoaded) {
        requestAnimationFrame(animateCloud);
        return;
      }
      
      const camera = document.querySelector('a-camera');
      if (!camera || !camera.object3D) {
        requestAnimationFrame(animateCloud);
        return;
      }
      
      // Отримуємо позицію камери у світових координатах
      const cameraWorldPos = new THREE.Vector3();
      camera.object3D.getWorldPosition(cameraWorldPos);
      
      // Оновлюємо кут з урахуванням часу
      if (lastFrameTime !== 0) {
        const delta = Math.min(0.033, (currentTime - lastFrameTime) / 1000);
        cloudAngle += cloudSpeed * delta;
        if (cloudAngle > Math.PI * 2) cloudAngle -= Math.PI * 2;
      }
      lastFrameTime = currentTime;
      
      // Обчислюємо позицію хмари по колу навколо камери
      const x = cameraWorldPos.x + cloudRadius * Math.cos(cloudAngle);
      const z = cameraWorldPos.z + cloudRadius * Math.sin(cloudAngle);
      const y = cameraWorldPos.y + 1.9; // на рівні голови дитини
      
      cloudImage.setAttribute('position', { x, y, z });
      
      requestAnimationFrame(animateCloud);
    }
    
    // Запускаємо анімацію після повного завантаження сцени
    window.addEventListener('load', () => {
      setTimeout(() => {
        animationActive = true;
        requestAnimationFrame(animateCloud);
      }, 500);
    });
    
    // ==================== ІНІЦІАЛІЗАЦІЯ 8TH WALL ====================
    let xrInitialized = false;
    
    function initXR() {
      if (xrInitialized) return;
      
      if (typeof XR8 !== 'undefined') {
        setStatus('✅ 8th Wall готовий. Шукаємо поверхню...');
        xrInitialized = true;
        
        // Слухаємо подію готовності XR8
        window.addEventListener('xrloaded', () => {
          setStatus('🎥 Камера активна. Наведіть на підлогу або стіл');
        });
        
        // Перевіряємо, чи XR8 вже готовий
        if (XR8.XrController && XR8.XrController.isReady) {
          window.dispatchEvent(new Event('xrloaded'));
        }
        
        // Додаткова перевірка помилок
        if (XR8.XrController) {
          XR8.XrController.on('error', (err) => {
            console.error('XR8 помилка:', err);
            setStatus(`⚠️ Помилка AR: ${err.message || 'невідома'}`, true);
          });
        }
      } else {
        setStatus('⏳ Очікування XR8...', false);
        setTimeout(initXR, 300);
      }
    }
    
    // Запускаємо ініціалізацію з невеликою затримкою для завантаження скриптів
    setTimeout(initXR, 500);
    
    // ==================== ДОДАТКОВІ ПОКРАЩЕННЯ ====================
    
    // 1. Обробка помилок XRExtras
    window.addEventListener('xrextras-error', (e) => {
      console.error('XRExtras error:', e.detail);
      setStatus(`❌ ${e.detail?.message || 'Помилка AR-модуля'}`, true);
    });
    
    // 2. Попереднє завантаження текстур для плавної зміни
    function preloadTextures() {
      const textureIds = ['#skySunny', '#skyCloudy', '#skyRainy', '#skyStormy'];
      textureIds.forEach(id => {
        const img = document.querySelector(id);
        if (img && !img.complete) {
          img.onload = () => console.log(`Текстура ${id} завантажена`);
        }
      });
    }
    preloadTextures();
    
    // 3. Адаптація для мобільних пристроїв: перевірка WebXR
    if (navigator.xr) {
      navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
        if (!supported) {
          setStatus('📱 Ваш пристрій не підтримує AR. Доступна демо-версія без доповненої реальності.', true);
        }
      }).catch(() => {
        setStatus('⚠️ WebXR недоступний. Працює лише 2D-режим.', true);
      });
    } else {
      setStatus('⚠️ WebXR не підтримується. AR-функції обмежені.', true);
    }
    
    // 4. Забезпечуємо, щоб аудіо розблоковувалось при першому дотику (користувацька взаємодія)
    function unlockAudio() {
      const allAudios = [document.getElementById('soundSunny'), document.getElementById('soundCloudy'), 
                         document.getElementById('soundRainy'), document.getElementById('soundStormy')];
      allAudios.forEach(audio => {
        if (audio) {
          audio.load();
          // Нічого не відтворюємо, просто розблоковуємо контекст
        }
      });
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
      console.log('Аудіо-контекст розблоковано');
    }
    
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('click', unlockAudio);
    
    // 5. Відстеження завантаження основних ресурсів
    window.addEventListener('load', () => {
      const assets = document.querySelector('a-assets');
      if (assets && assets.hasLoaded) {
        setStatus('✅ Всі ресурси завантажені. Готово до AR!');
      } else if (assets) {
        assets.addEventListener('loaded', () => {
          setStatus('✅ Ресурси завантажено. Почніть взаємодію!');
        });
      }
    });
    
    // 6. Приховати статус через 8 секунд (не заважає)
    setTimeout(() => {
      if (statusDiv && statusDiv.innerHTML.includes('✅')) {
        statusDiv.style.opacity = '0.7';
        setTimeout(() => {
          if (statusDiv) statusDiv.style.opacity = '1';
        }, 2000);
      }
    }, 8000);
    
    console.log('Сторінка повністю завантажена, скрипти активовані');
  </script>
</body>
</html>
