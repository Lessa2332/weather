<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>8th Wall: Дитяча погода в небі</title>

    <!-- Бібліотеки 8th Wall (відкрита версія) -->
    <script src="https://8thwall.org/aframe/8frame-1.5.0.min.js"></script>
    <script src="https://8thwall.org/xrextras/xrextras.js"></script>
    <script src="https://8thwall.org/landing-page/landing-page.js"></script>
    <script src="https://8thwall.org/coaching-overlay/coaching-overlay.js"></script>
    <script async src="https://8thwall.org/xrweb?selfHosted=true"></script>

    <style>
      .weather-panel {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 15px;
        z-index: 100;
        background: rgba(0,0,0,0.6);
        padding: 12px;
        border-radius: 40px;
        margin: 0 auto;
        width: fit-content;
        backdrop-filter: blur(5px);
      }
      .weather-btn {
        background: white;
        border: none;
        border-radius: 40px;
        padding: 10px 20px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        transition: transform 0.2s;
        font-family: sans-serif;
      }
      .weather-btn:active { transform: scale(0.95); }
      @media (max-width: 600px) {
        .weather-btn { padding: 12px 18px; font-size: 1rem; }
      }
    </style>
  </head>
  <body>
    <a-scene 
        xrextras-loading
        xrextras-runtime-error
        landing-page
        sky-coaching-overlay
        sky-recenter
        renderer="colorManagement: true"
        xrlayers>

        <a-assets>
          <img id="skySunny"   src="./assets/sunny.png">
          <img id="skyCloudy"  src="./assets/cloudy.png">
          <img id="skyRainy"   src="./assets/rainy.png">
          <img id="skyStormy"  src="./assets/stormy.png">
          <img id="skyDefault" src="./assets/space.png">
        </a-assets>

        <a-camera position="0 3 0"></a-camera>

        <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.6">
          <a-sky id="weatherSky" material="src: #skyDefault; transparent: true; opacity: 1;"></a-sky>
          <a-box 
              position="0 10 -10"
              scale="5 5 5"
              material="color: #AD50FF; shader: flat; src: https://cdn.8thwall.com/web/assets/cube-texture.png"
              shadow>
          </a-box>
          <a-entity light="type: ambient; intensity: 1;"></a-entity>
        </a-entity>
    </a-scene>

    <!-- Інтерфейс кнопок -->
    <div class="weather-panel">
      <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
      <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
      <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
      <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
    </div>

    <!-- Приховані аудіоелементи -->
    <audio id="soundSunny"  src="./sounds/sunny.mp3"  preload="auto"></audio>
    <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
    <audio id="soundRainy"  src="./sounds/rainy.mp3"  preload="auto"></audio>
    <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>

    <script>
      // Реєструємо компонент центрування (замість окремого файлу)
      AFRAME.registerComponent('sky-recenter', {
        init() {
          const recenter = () => {
            this.el.emit('recenter')
            this.el.removeEventListener('sky-coaching-overlay.hide', recenter)
          }
          this.el.addEventListener('sky-coaching-overlay.hide', recenter)
        },
      });

      // Логіка зміни погоди та відтворення звуку
      const skyEntity = document.getElementById('weatherSky');
      const weatherMap = {
        sunny: { textureId: '#skySunny',  soundId: 'soundSunny' },
        cloudy: { textureId: '#skyCloudy', soundId: 'soundCloudy' },
        rainy:  { textureId: '#skyRainy',  soundId: 'soundRainy' },
        stormy: { textureId: '#skyStormy', soundId: 'soundStormy' }
      };

      function setWeather(weatherType) {
        const w = weatherMap[weatherType];
        if (!w) return;
        
        skyEntity.setAttribute('material', 'src', w.textureId);
        
        const audio = document.getElementById(w.soundId);
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(e => console.warn('Аудіо не відтворено:', e));
        }
        
        console.log(`Погода змінена на: ${weatherType}`);
      }

      document.querySelectorAll('.weather-btn').forEach(btn => {
        btn.addEventListener('click', () => setWeather(btn.getAttribute('data-weather')));
      });
    </script>
  </body>
</html>
