<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes"> <!-- виправлення попередження -->
  <title>Дитяча погода в небі</title>

  <!-- 8th Wall Standalone Engine -->
  <script async src="./xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <style>
    body { margin:0; overflow:hidden; font-family:'Segoe UI',sans-serif; background:#000; }
    #xr-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
    #start-btn {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:200;
      background:#00aaff; color:white; border:none; border-radius:40px; padding:14px 28px;
      font-size:1.2rem; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.4);
    }
    .weather-panel {
      position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:center; gap:12px;
      z-index:100; background:rgba(0,0,0,0.7); padding:12px 20px; border-radius:60px; width:fit-content; margin:0 auto;
    }
    .weather-btn {
      background:linear-gradient(135deg,#fff,#f5f5f5); border:none; border-radius:50px;
      padding:12px 24px; font-size:1.2rem; font-weight:bold; cursor:pointer; min-width:100px;
    }
    #status {
      position:fixed; top:15px; left:15px; background:rgba(0,0,0,0.8); color:#00ffcc;
      padding:8px 14px; border-radius:20px; z-index:200; font-family:monospace; font-size:12px;
    }
  </style>
</head>
<body>
  <canvas id="xr-canvas"></canvas>
  <div id="status">🔄 Завантаження 8th Wall...</div>
  <button id="start-btn">🚀 Запустити AR</button>

  <div class="weather-panel">
    <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
    <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
    <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
    <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
  </div>

  <audio id="soundSunny" src="./sounds/sunny.mp3" preload="auto"></audio>
  <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
  <audio id="soundRainy" src="./sounds/rainy.mp3" preload="auto"></audio>
  <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>

  <script>
    const status = document.getElementById('status');

    function setStatus(msg, err = false) {
      status.innerHTML = msg;
      status.style.borderLeftColor = err ? '#ff5555' : '#00ffcc';
    }

    // Чекаємо, поки XR8 з'явиться (через async скрипт)
    function waitForXR8() {
      if (window.XR8) {
        initAR();
      } else {
        setTimeout(waitForXR8, 50);
      }
    }

    function initAR() {
      XR8.addEventListener('xrloaded', () => {
        XR8.XrController.configure({ worldTracking: true });

        const scene = XR8.Three.scene();
        const camera = XR8.Three.camera();

        // Небо
        const skyGeo = new THREE.SphereGeometry(500, 64, 64);
        const skyMat = new THREE.MeshBasicMaterial({
          map: new THREE.TextureLoader().load('./assets/space.png'),
          transparent: true,
          opacity: 0.28,
          side: THREE.BackSide,
          depthWrite: false
        });
        const sky = new THREE.Mesh(skyGeo, skyMat);
        scene.add(sky);

        // Хмаринка
        const cloudTex = new THREE.TextureLoader().load('./assets/cloud.png');
        const cloudMat = new THREE.SpriteMaterial({ map: cloudTex, transparent: true, opacity: 0.95 });
        const cloud = new THREE.Sprite(cloudMat);
        cloud.scale.set(3.5, 3.5, 1);
        scene.add(cloud);

        let angle = 0;
        function animate() {
          requestAnimationFrame(animate);
          const pos = camera.getWorldPosition(new THREE.Vector3());
          angle += 0.009;
          cloud.position.set(pos.x + 3.8 * Math.cos(angle), pos.y + 2.3, pos.z + 3.8 * Math.sin(angle));
        }
        animate();

        // Кнопки погоди
        document.querySelectorAll('.weather-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const type = btn.getAttribute('data-weather');
            const map = {
              sunny: './assets/sunny.png',
              cloudy: './assets/cloudy.png',
              rainy: './assets/rainy.png',
              stormy: './assets/stormy.png'
            };
            skyMat.map = new THREE.TextureLoader().load(map[type]);
            skyMat.needsUpdate = true;

            const audio = document.getElementById(`sound${type.charAt(0).toUpperCase() + type.slice(1)}`);
            if (audio) { audio.currentTime = 0; audio.play(); }
          });
        });

        setStatus('✅ AR запущено! Реальний світ + погода');
      });

      // Запускаємо 8th Wall
      XR8.init({ canvas: document.getElementById('xr-canvas') });
    }

    // Запуск при натисканні кнопки
    document.getElementById('start-btn').addEventListener('click', () => {
      setStatus('🎥 Запускаємо AR...');
      waitForXR8();
    });

    window.addEventListener('load', () => {
      setStatus('✅ Готово. Натисни "Запустити AR"');
    });
  </script>
</body>
</html>
