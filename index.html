<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>8th Wall: Дитяча погода в небі (локальні текстури)</title>

    <!-- Бібліотеки 8th Wall (відкрита версія) -->
    <script src="https://8thwall.org/aframe/8frame-1.5.0.min.js"></script>
    <script src="https://8thwall.org/xrextras/xrextras.js"></script>
    <script src="https://8thwall.org/landing-page/landing-page.js"></script>
    <script src="https://8thwall.org/coaching-overlay/coaching-overlay.js"></script>
    <script async src="https://8thwall.org/xrweb?selfHosted=true"></script>

    <style>
      .weather-panel {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 15px;
        z-index: 100;
        background: rgba(0,0,0,0.6);
        padding: 12px;
        border-radius: 40px;
        margin: 0 auto;
        width: fit-content;
        backdrop-filter: blur(5px);
      }
      .weather-btn {
        background: white;
        border: none;
        border-radius: 40px;
        padding: 10px 20px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        transition: transform 0.2s;
        font-family: sans-serif;
      }
      .weather-btn:active { transform: scale(0.95); }
      @media (max-width: 600px) {
        .weather-btn { padding: 12px 18px; font-size: 1rem; }
      }
    </style>
  </head>
  <body>
    <a-scene 
        xrextras-loading
        xrextras-runtime-error
        landing-page
        sky-coaching-overlay
        sky-recenter
        renderer="colorManagement: true"
        xrlayers>

        <a-assets>
          <!-- Локальні текстури (шляхи відносно кореня репозиторію) -->
          <img id="skySunny"   src="./assets/sunny.jpg">
          <img id="skyCloudy"  src="./assets/cloudy.jpg">
          <img id="skyRainy"   src="./assets/rainy.jpg">
          <img id="skyStormy"  src="./assets/stormy.jpg">
          <img id="skyDefault" src="./assets/space.png">
        </a-assets>

        <a-camera position="0 3 0"></a-camera>

        <!-- Шар неба -->
        <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.6">
          <a-sky id="weatherSky" material="src: #skyDefault; transparent: true; opacity: 1;"></a-sky>

          <!-- Додатковий об'єкт (можна залишити або видалити) -->
          <a-box 
              position="0 10 -10"
              scale="5 5 5"
              material="color: #AD50FF; shader: flat; src: https://cdn.8thwall.com/web/assets/cube-texture.png"
              shadow>
          </a-box>

          <a-entity light="type: ambient; intensity: 1;"></a-entity>
        </a-entity>
    </a-scene>

    <!-- Інтерфейс кнопок -->
    <div class="weather-panel">
      <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
      <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
      <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
      <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
    </div>

    <script>
      // Компонент sky-recenter (якщо використовується в сцені)
      AFRAME.registerComponent('sky-recenter', {
        init() {
          const recenter = () => {
            this.el.emit('recenter')
            this.el.removeEventListener('sky-coaching-overlay.hide', recenter)
          }
          this.el.addEventListener('sky-coaching-overlay.hide', recenter)
        },
      })

      // Логіка зміни погоди
      const skyEntity = document.getElementById('weatherSky');
      const weatherMap = {
        sunny: '#skySunny',
        cloudy: '#skyCloudy',
        rainy: '#skyRainy',
        stormy: '#skyStormy'
      };

      function setWeather(weatherType) {
        if (!weatherMap[weatherType]) return;
        skyEntity.setAttribute('material', 'src', weatherMap[weatherType]);
        console.log(`Погода змінена на: ${weatherType}`);
      }

      document.querySelectorAll('.weather-btn').forEach(btn => {
        btn.addEventListener('click', () => setWeather(btn.getAttribute('data-weather')));
      });
    </script>
  </body>
</html>
