<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- Важливо для iOS WebXR -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <title>Дитяча погода в небі</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- Твої стилі (скопіюй повністю з попереднього коду) -->
  <style>
    /* ... встав сюди весь свій CSS ... */
  </style>
</head>
<body>
  <div id="status">🔄 Завантаження...</div>
  <button id="start-btn">🚀 Запустити AR</button>

  <a-scene
    background="transparent"
    renderer="colorManagement: true; antialias: true; alpha: true;"
    xr-mode-ui="enabled: true; enterAREnabled: true; exitAREnabled: true; XRMode: ar;"
    webxr="mode: immersive-ar; optionalFeatures: dom-overlay; referenceSpaceType: local;"
  >
    <!-- Твої a-assets, a-camera, weatherSky, movingCloud, lights -->
    <a-assets>
      <img id="skySunny" src="./assets/sunny.png" crossorigin="anonymous">
      <img id="skyCloudy" src="./assets/cloudy.png" crossorigin="anonymous">
      <img id="skyRainy" src="./assets/rainy.png" crossorigin="anonymous">
      <img id="skyStormy" src="./assets/stormy.png" crossorigin="anonymous">
      <img id="skyDefault" src="./assets/space.png" crossorigin="anonymous">
      <img id="cloudTexture" src="./assets/cloud.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <a-sphere id="weatherSky"
              radius="500"
              material="src: #skyDefault; transparent: true; opacity: 0.3; alphaTest: 0.1; side: back;"
              position="0 0 0">
    </a-sphere>

    <a-image id="movingCloud"
             src="#cloudTexture"
             width="1.5" height="1.5"
             material="transparent: true; alphaTest: 0.3"
             look-at="[camera]"
             visible="false">
    </a-image>

    <a-entity light="type: ambient; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; intensity: 0.7; position: 3 5 2"></a-entity>
  </a-scene>

  <!-- Твоя weather-panel та audio -->

  <script>
    // Твій повний скрипт: setStatus, stopAllSounds, weatherMap, setWeather, кнопки, анімація хмари, fallback canvas

    // Оновлений запуск AR з підтримкою iOS + Android + fallback
    const startBtn = document.getElementById('start-btn');
    const scene = document.querySelector('a-scene');

    startBtn.addEventListener('click', async () => {
      if (!navigator.xr) {
        setStatus('❌ Браузер не підтримує WebXR', true);
        return;
      }

      let supported = false;
      try {
        supported = await navigator.xr.isSessionSupported('immersive-ar');
      } catch (e) {
        console.warn('isSessionSupported error:', e);
      }

      if (supported) {
        setStatus('🎥 Запускаємо AR... (Android / iOS)');
        try {
          await scene.enterAR();
          startBtn.style.display = 'none';
          setStatus('✅ AR активний! Наведіть камеру навколо себе');
        } catch (err) {
          console.error('AR error:', err.name, err.message, err.code);
          setStatus(`❌ Помилка запуску AR: ${err.name || 'невідомо'} — ${err.message}`, true);
        }
      } else {
        // Fallback для пристроїв без immersive-ar (ноутбук, старий iPhone, Chrome на iOS)
        setStatus('⚠️ Повноцінний AR недоступний. Показуємо 3D-сцену (веб-камера або чорний фон)', true);
        startBtn.style.display = 'none';
        // Можна спробувати enterVR() якщо є шолом, або просто показати сцену
        // await scene.enterVR(); // закоментуй, якщо не потрібно
      }
    });

    // Розблокування аудіо
    function unlockAudio() {
      document.querySelectorAll('audio').forEach(a => a.load());
      document.removeEventListener('touchstart', unlockAudio);
      document.removeEventListener('click', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('click', unlockAudio);

    window.addEventListener('load', () => {
      setStatus('✅ Готово. Натисни "Запустити AR" та дозволь камеру');
    });
  </script>
</body>
</html>
