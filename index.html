<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="8thwall:package" content="@8thwall/sky-effects">
  <title>🌤️ Дитяча погода в небі</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  
  <!-- Локальні 8th Wall файли -->
  <script src="./xr-standalone/xr.js"></script>
  <script src="./xr-standalone/sky-recenter.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: white; 
           min-height: 100vh; display: flex; flex-direction: column; 
           align-items: center; justify-content: center; padding: 20px; }
    #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
              background: rgba(0,0,0,0.85); padding: 12px 24px; border-radius: 50px; 
              font-size: 14px; z-index: 1000; text-align: center; max-width: 90vw; }
    #status.error { background: rgba(220,50,50,0.9); }
    #start-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; 
                 border: none; padding: 18px 40px; font-size: 18px; border-radius: 50px; 
                 cursor: pointer; margin: 20px 0; font-weight: 600; }
    #start-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .weather-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                     display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; 
                     z-index: 999; padding: 10px; background: rgba(0,0,0,0.7); border-radius: 20px; }
    .weather-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); 
                   color: white; padding: 10px 16px; border-radius: 15px; cursor: pointer; 
                   font-size: 14px; min-width: 70px; }
    .weather-btn.active { background: rgba(255,255,255,0.4); border-color: white; }
    a-scene { position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    .tutorial { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
                background: rgba(0,0,0,0.9); padding: 15px 25px; border-radius: 16px; 
                max-width: 90vw; text-align: center; z-index: 998; }
    .tutorial.hidden { display: none; }
  </style>
</head>
<body>

  <div id="status">🔄 Завантаження...</div>
  <button id="start-btn">🚀 Запустити Sky AR</button>

  <div class="weather-panel" id="weatherPanel" style="display:none;">
    <button class="weather-btn active" data-weather="default">✨ Default</button>
    <button class="weather-btn" data-weather="sunny">☀️ Сонце</button>
    <button class="weather-btn" data-weather="cloudy">⛅ Хмарно</button>
    <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
    <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
  </div>

  <div class="tutorial" id="tutorial">👆 Наведіть камеру на небо</div>

  <!-- A-Frame Scene -->
  <a-scene
    xrlayers
    background="transparent"
    renderer="colorManagement: true; antialias: true; alpha: true;"
    xr-mode-ui="enabled: false"
    webxr="mode: immersive-ar; referenceSpaceType: local;"
    sky-recenter
    embedded
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-assets>
      <img id="skySunny" src="./assets/sunny.png" crossorigin="anonymous">
      <img id="skyCloudy" src="./assets/cloudy.png" crossorigin="anonymous">
      <img id="skyRainy" src="./assets/rainy.png" crossorigin="anonymous">
      <img id="skyStormy" src="./assets/stormy.png" crossorigin="anonymous">
      <img id="skyDefault" src="./assets/space.png" crossorigin="anonymous">
      <img id="cloudTexture" src="./assets/cloud.png" crossorigin="anonymous">
      <audio id="soundSunny" src="./sounds/sunny.mp3" preload="auto"></audio>
      <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
      <audio id="soundRainy" src="./sounds/rainy.mp3" preload="auto"></audio>
      <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <!-- Sky Scene Container -->
    <a-entity 
      xrlayerscene="name:sky; edgeSmoothness: 0.15;" 
      id="skyScene"
    >
      <a-entity id="pivot" rotation="0 0 0">
        <a-sphere id="weatherSky"
                  radius="500"
                  material="src: #skyDefault; transparent: true; opacity: 0.95; side: back;">
        </a-sphere>

        <!-- Clouds -->
        <a-entity id="cloudsGroup">
          <a-image src="#cloudTexture" width="12" height="12"
                   material="transparent: true; alphaTest: 0.2"
                   position="-15 25 -40"
                   animation__move="property: position; to: 15 28 -35; dur: 25000; easing: linear; loop: true">
          </a-image>
        </a-entity>

        <!-- Sun -->
        <a-sphere id="sunIndicator" radius="8"
                  material="color: #FFD700; emissive: #FFA500; emissiveIntensity: 0.5;"
                  position="30 40 -60" visible="false">
          <a-light type="point" intensity="0.8" distance="100" color="#FFF4E5"></a-light>
        </a-sphere>
      </a-entity>
    </a-entity>

    <!-- Coaching Overlay -->
    <a-entity id="coachingOverlay" sky-coaching-overlay visible="false">
      <a-text value="👆 Погляньте вгору на небо" align="center" color="white"
              background-color="rgba(0,0,0,0.7)" padding="1.5 2" position="0 0 -3">
      </a-text>
    </a-entity>

    <!-- Lights -->
    <a-entity light="type: ambient; intensity: 0.7; color: #BBDEFB"></a-entity>
    <a-entity light="type: directional; intensity: 0.6; position: 5 10 3"></a-entity>
  </a-scene>

  <script>
    // ==================== STATE ====================
    let arActive = false;
    let sounds = {};
    const weatherMap = {
      default: { sky: '#skyDefault', sound: null },
      sunny:   { sky: '#skySunny',   sound: 'soundSunny' },
      cloudy:  { sky: '#skyCloudy',  sound: 'soundCloudy' },
      rainy:   { sky: '#skyRainy',   sound: 'soundRainy' },
      stormy:  { sky: '#skyStormy',  sound: 'soundStormy' }
    };

    function setStatus(msg, err = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.toggle('error', err);
    }

    function stopAllSounds() {
      Object.values(sounds).forEach(s => { if (s && !s.paused) { s.pause(); s.currentTime = 0; } });
    }

    function playSound(id) {
      stopAllSounds();
      if (id && sounds[id]) sounds[id].play().catch(() => {});
    }

    function setWeather(type) {
      const cfg = weatherMap[type] || weatherMap.default;
      const sky = document.getElementById('weatherSky');
      sky.setAttribute('material', 'src', cfg.sky);
      playSound(cfg.sound);
      document.querySelectorAll('.weather-btn').forEach(btn => 
        btn.classList.toggle('active', btn.dataset.weather === type)
      );
      document.getElementById('sunIndicator').setAttribute('visible', type === 'sunny');
    }

    // ==================== 8TH WALL INIT ====================
    async function initXR() {
      return new Promise((resolve, reject) => {
        if (typeof XR === 'undefined') {
          reject(new Error('8th Wall not loaded'));
          return;
        }
        XR.init({
          onLoaded: () => {
            console.log('✅ 8th Wall loaded');
            ['soundSunny','soundCloudy','soundRainy','soundStormy'].forEach(id => {
              const el = document.getElementById(id);
              if (el) sounds[id] = el;
            });
            resolve();
          },
          onError: reject
        });
      });
    }

    async function startAR() {
      setStatus('🎥 Запуск камери...');
      try {
        await XR.start({ cameraPipeline: { sky: { enabled: true } } });
        arActive = true;
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('weatherPanel').style.display = 'flex';
        document.getElementById('tutorial').classList.add('hidden');
        
        // Показати coaching overlay
        const coaching = document.getElementById('coachingOverlay');
        if (coaching) {
          coaching.setAttribute('visible', 'true');
          setTimeout(() => coaching.setAttribute('visible', 'false'), 5000);
        }
        
        setStatus('✅ Sky AR активний!');
        
        // Слухач детекції неба
        document.querySelector('a-scene').addEventListener('xrlayers-sky-detected', () => {
          if (coaching) coaching.setAttribute('visible', 'false');
        });
      } catch (err) {
        console.error(err);
        setStatus('❌ Помилка: ' + err.message, true);
      }
    }

    // ==================== EVENTS ====================
    document.getElementById('start-btn').addEventListener('click', async () => {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      try {
        if (!window.xrInitialized) {
          await initXR();
          window.xrInitialized = true;
        }
        await startAR();
      } finally {
        btn.disabled = false;
      }
    });

    document.querySelectorAll('.weather-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        if (!arActive) { setStatus('⚠️ Спочатку запустіть AR', true); return; }
        setWeather(e.currentTarget.dataset.weather);
      });
    });

    // Audio unlock
    function unlockAudio() {
      Object.values(sounds).forEach(s => {
        if (s) { s.load(); s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{}); }
      });
      document.removeEventListener('touchstart', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio, { passive: true });

    // Init
    window.addEventListener('load', async () => {
      try {
        await initXR();
        setStatus('✅ Готово. Натисніть "Запустити Sky AR"');
      } catch (e) {
        setStatus('⚠️ Перевірте підключення');
      }
    });
  </script>
</body>
</html>
