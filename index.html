<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Дитяча погода в небі</title>

  <!-- 8th Wall Standalone Engine (з попереднім завантаженням SLAM, але він може не знадобитися) -->
  <script async src="./xr-standalone/xr.js"></script>

  <style>
    body { margin:0; overflow:hidden; font-family:'Segoe UI',sans-serif; background:#000; }
    #xr-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
    #start-btn {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:200;
      background:#00aaff; color:white; border:none; border-radius:40px; padding:14px 28px;
      font-size:1.2rem; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.4);
    }
    .weather-panel {
      position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:center; gap:12px;
      z-index:100; background:rgba(0,0,0,0.7); padding:12px 20px; border-radius:60px; width:fit-content; margin:0 auto;
    }
    .weather-btn {
      background:linear-gradient(135deg,#fff,#f5f5f5); border:none; border-radius:50px;
      padding:12px 24px; font-size:1.2rem; font-weight:bold; cursor:pointer; min-width:100px;
      transition: transform 0.1s, background 0.1s;
    }
    .weather-btn.active {
      background: linear-gradient(135deg, #ffd966, #ffb347);
      box-shadow: 0 0 8px rgba(255,200,0,0.6);
    }
    .weather-btn:active { transform: scale(0.95); }
    #status {
      position:fixed; top:15px; left:15px; background:rgba(0,0,0,0.8); color:#00ffcc;
      padding:8px 14px; border-radius:20px; z-index:200; font-family:monospace; font-size:12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="xr-canvas"></canvas>
  <div id="status">🔄 Завантаження 8th Wall...</div>
  <button id="start-btn">🚀 Запустити AR</button>

  <div class="weather-panel">
    <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
    <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
    <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
    <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
  </div>

  <audio id="soundSunny" src="./sounds/sunny.mp3" preload="auto"></audio>
  <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
  <audio id="soundRainy" src="./sounds/rainy.mp3" preload="auto"></audio>
  <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>

  <script>
    const statusDiv = document.getElementById('status');
    function setStatus(msg, err = false) {
      statusDiv.innerHTML = msg;
      statusDiv.style.borderLeftColor = err ? '#ff5555' : '#00ffcc';
    }

    // Зупинка всіх звуків
    function stopAllSounds() {
      const sounds = ['soundSunny', 'soundCloudy', 'soundRainy', 'soundStormy'];
      sounds.forEach(id => {
        const audio = document.getElementById(id);
        if (audio && !audio.paused) {
          audio.pause();
          audio.currentTime = 0;
        }
      });
    }

    // Функція зміни погоди (буде доступна після запуску AR)
    let setWeatherCallback = null;

    // Глобальні змінні для Three.js об'єктів
    let skyMesh = null;
    let cloudSprite = null;
    let cloudAngle = 0;
    let lastTimestamp = 0;

    // Запуск AR (після натискання кнопки)
    function startAR() {
      window.addEventListener('xrloaded', () => {
        // Конфігурація (worldTracking для відстеження позиції камери)
        if (XR8.XrController) {
          XR8.XrController.configure({ worldTracking: true });
        }

        const scene = XR8.Three.scene();
        const camera = XR8.Three.camera();

        // ----- Сфера неба -----
        const skyGeometry = new THREE.SphereGeometry(500, 64, 64);
        const skyMaterial = new THREE.MeshBasicMaterial({
          map: new THREE.TextureLoader().load('./assets/space.png'),
          transparent: true,
          opacity: 1.0,
          side: THREE.BackSide,
          depthWrite: false
        });
        skyMesh = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(skyMesh);

        // ----- Хмара (спрайт) -----
        let cloudTexture = null;
        const loadCloudTexture = (url) => {
          const loader = new THREE.TextureLoader();
          loader.load(url, 
            (tex) => {
              cloudTexture = tex;
              cloudSprite.material.map = cloudTexture;
              cloudSprite.material.needsUpdate = true;
              cloudSprite.visible = true;
            },
            undefined,
            () => {
              // fallback: створюємо canvas текстуру
              const canvas = document.createElement('canvas');
              canvas.width = 256;
              canvas.height = 256;
              const ctx = canvas.getContext('2d');
              ctx.fillStyle = 'rgba(0,0,0,0)';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.fillStyle = 'rgba(255,255,255,0.95)';
              ctx.beginPath();
              ctx.arc(128, 128, 60, 0, Math.PI * 2);
              ctx.arc(180, 110, 50, 0, Math.PI * 2);
              ctx.arc(80, 110, 45, 0, Math.PI * 2);
              ctx.fill();
              const fallbackTex = new THREE.CanvasTexture(canvas);
              cloudSprite.material.map = fallbackTex;
              cloudSprite.material.needsUpdate = true;
              cloudSprite.visible = true;
              setStatus('☁️ Хмарка (резервна)');
            }
          );
        };

        cloudSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: null, transparent: true, opacity: 0.95 }));
        cloudSprite.scale.set(2.5, 2.5, 1);
        cloudSprite.visible = false;
        scene.add(cloudSprite);
        loadCloudTexture('./assets/cloud.png');

        // Анімація хмари (рух навколо камери)
        function animateCloud(now) {
          requestAnimationFrame(animateCloud);
          if (!cloudSprite.visible) return;
          const dt = Math.min(0.033, (now - lastTimestamp) / 1000);
          lastTimestamp = now;
          cloudAngle += 0.9 * dt; // швидкість обертання
          const radius = 3.8;
          const camPos = camera.getWorldPosition(new THREE.Vector3());
          const x = camPos.x + radius * Math.cos(cloudAngle);
          const z = camPos.z + radius * Math.sin(cloudAngle);
          const y = camPos.y + 2.3;
          cloudSprite.position.set(x, y, z);
        }
        requestAnimationFrame(animateCloud);

        // ----- Функція зміни погоди (звуки + текстура) -----
        const weatherMap = {
          sunny:  { tex: './assets/sunny.png',  soundId: 'soundSunny'  },
          cloudy: { tex: './assets/cloudy.png', soundId: 'soundCloudy' },
          rainy:  { tex: './assets/rainy.png',  soundId: 'soundRainy'  },
          stormy: { tex: './assets/stormy.png', soundId: 'soundStormy' }
        };

        function setWeather(type) {
          const cfg = weatherMap[type];
          if (!cfg) return;
          // Зупиняємо всі звуки
          stopAllSounds();
          // Змінюємо текстуру неба
          new THREE.TextureLoader().load(cfg.tex, (tex) => {
            skyMesh.material.map = tex;
            skyMesh.material.needsUpdate = true;
          });
          // Відтворюємо звук
          const audio = document.getElementById(cfg.soundId);
          if (audio) {
            audio.currentTime = 0;
            audio.play().catch(e => console.warn('audio play blocked:', e));
          }
          // Оновлюємо активну кнопку
          document.querySelectorAll('.weather-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-weather') === type);
          });
          setStatus(`🌤️ Погода: ${type === 'sunny' ? 'Сонячно' : type === 'cloudy' ? 'Хмарно' : type === 'rainy' ? 'Дощ' : 'Гроза'}`);
        }

        // Робимо функцію доступною глобально для кнопок
        window.setWeather = setWeather;

        // Активуємо першу кнопку за замовчуванням
        const defaultBtn = document.querySelector('.weather-btn[data-weather="sunny"]');
        if (defaultBtn) defaultBtn.classList.add('active');

        setStatus('✅ AR запущено! Реальний світ + погода');
      });

      // Запуск рушія
      XR8.run({ canvas: document.getElementById('xr-canvas') });
    }

    // Обробник кнопки запуску
    document.getElementById('start-btn').addEventListener('click', () => {
      setStatus('🎥 Запускаємо AR...');
      startAR();
      document.getElementById('start-btn').style.display = 'none';
    });

    // Обробники кнопок погоди (після запуску AR вони будуть працювати через window.setWeather)
    document.querySelectorAll('.weather-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (typeof window.setWeather === 'function') {
          window.setWeather(e.currentTarget.getAttribute('data-weather'));
        } else {
          setStatus('⚠️ Зачекайте, AR ще не запущено', true);
        }
      });
    });

    // Розблокування аудіо (перший дотик)
    function unlockAudio() {
      const audios = ['soundSunny', 'soundCloudy', 'soundRainy', 'soundStormy'];
      audios.forEach(id => {
        const a = document.getElementById(id);
        if (a) a.load();
      });
      document.removeEventListener('touchstart', unlockAudio);
    }
    document.addEventListener('touchstart', unlockAudio, { passive: true });

    window.addEventListener('load', () => {
      setStatus('✅ Готово. Натисніть "Запустити AR"');
    });
  </script>
</body>
</html>
