<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>8th Wall: Дитяча погода в небі</title>

    <!-- Self-hosted 8th Wall core modules (без app key) -->
    <script src="./xr-standalone/xr.js"></script>
    <script src="./xr-standalone/xr-slam.js"></script>

    <!-- A-Frame та 8th Wall A-Frame компоненти (з відкритого CDN) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://8thwall.org/aframe/8frame-1.5.0.min.js"></script>

    <!-- XRExtras (ті самі, що й раніше) -->
    <script src="https://8thwall.org/xrextras/xrextras.js"></script>
    <script src="https://8thwall.org/xrextras/landing-page.js"></script>
    <script src="https://8thwall.org/xrextras/coaching-overlay.js"></script>

    <!-- Підключаємо ваш компонент sky-recenter (якщо він є) -->
    <script src="./sky-recenter.js"></script>

    <style>
      .weather-panel {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 15px;
        z-index: 100;
        background: rgba(0,0,0,0.6);
        padding: 12px;
        border-radius: 40px;
        margin: 0 auto;
        width: fit-content;
        backdrop-filter: blur(5px);
      }
      .weather-btn {
        background: white;
        border: none;
        border-radius: 40px;
        padding: 10px 20px;
        font-size: 1.2rem;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        transition: transform 0.2s;
        font-family: sans-serif;
      }
      .weather-btn:active { transform: scale(0.95); }
      @media (max-width: 600px) {
        .weather-btn { padding: 12px 18px; font-size: 1rem; }
      }
      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        font-family: monospace;
        z-index: 200;
        font-size: 12px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="status">⏳ Завантаження...</div>

    <!-- A-Frame сцена без атрибута xrweb (ініціалізація через скрипти) -->
    <a-scene 
      xrextras-loading
      xrextras-runtime-error
      landing-page
      sky-coaching-overlay
      sky-recenter
      renderer="colorManagement: true">

      <a-assets>
        <img id="skySunny"   src="./assets/sunny.png">
        <img id="skyCloudy"  src="./assets/cloudy.png">
        <img id="skyRainy"   src="./assets/rainy.png">
        <img id="skyStormy"  src="./assets/stormy.png">
        <img id="skyDefault" src="./assets/space.png">
      </a-assets>

      <a-camera position="0 3 0"></a-camera>

      <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.6">
        <a-sky id="weatherSky" material="src: #skyDefault; transparent: true; opacity: 1;"></a-sky>
        <!-- Фіолетовий куб видалено – зайвий -->
        <a-entity light="type: ambient; intensity: 1;"></a-entity>
      </a-entity>
    </a-scene>

    <div class="weather-panel">
      <button class="weather-btn" data-weather="sunny">☀️ Сонячно</button>
      <button class="weather-btn" data-weather="cloudy">☁️ Хмарно</button>
      <button class="weather-btn" data-weather="rainy">🌧️ Дощ</button>
      <button class="weather-btn" data-weather="stormy">⛈️ Гроза</button>
    </div>

    <audio id="soundSunny"  src="./sounds/sunny.mp3"  preload="auto"></audio>
    <audio id="soundCloudy" src="./sounds/cloudy.mp3" preload="auto"></audio>
    <audio id="soundRainy"  src="./sounds/rainy.mp3"  preload="auto"></audio>
    <audio id="soundStormy" src="./sounds/stormy.mp3" preload="auto"></audio>

    <script>
      const statusDiv = document.getElementById('status');
      function setStatus(msg) {
        statusDiv.innerHTML = msg;
        console.log(msg);
      }

      // Функція зупинки всіх звуків
      function stopAllSounds() {
        const sounds = ['soundSunny', 'soundCloudy', 'soundRainy', 'soundStormy'];
        sounds.forEach(id => {
          const audio = document.getElementById(id);
          if (audio) {
            audio.pause();
            audio.currentTime = 0;
          }
        });
      }

      // Функція зміни погоди
      const skyEntity = document.getElementById('weatherSky');
      const weatherMap = {
        sunny: { textureId: '#skySunny',  soundId: 'soundSunny' },
        cloudy: { textureId: '#skyCloudy', soundId: 'soundCloudy' },
        rainy:  { textureId: '#skyRainy',  soundId: 'soundRainy' },
        stormy: { textureId: '#skyStormy', soundId: 'soundStormy' }
      };

      function setWeather(weatherType) {
        const w = weatherMap[weatherType];
        if (!w) return;

        // Зупиняємо попередній звук
        stopAllSounds();

        // Змінюємо текстуру неба
        if (skyEntity) {
          skyEntity.setAttribute('material', 'src', w.textureId);
        }

        // Відтворюємо новий звук
        const audio = document.getElementById(w.soundId);
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(e => console.warn('Аудіо не відтворено:', e));
        }
        setStatus(`Погода: ${weatherType}`);
      }

      document.querySelectorAll('.weather-btn').forEach(btn => {
        btn.addEventListener('click', () => setWeather(btn.getAttribute('data-weather')));
      });

      // Очікування завантаження XR8
      function waitForXR8() {
        if (typeof XR8 !== 'undefined') {
          setStatus('✅ XR8 готовий. Камера активується...');
          window.addEventListener('xrloaded', () => {
            setStatus('🎥 Камера активована. Наведіть на горизонтальну поверхню.');
          });
          if (XR8.XrController && XR8.XrController.isReady) {
            window.dispatchEvent(new Event('xrloaded'));
          }
        } else {
          setStatus('⏳ Очікування XR8...');
          setTimeout(waitForXR8, 500);
        }
      }
      waitForXR8();
    </script>
  </body>
</html>
